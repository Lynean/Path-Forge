# Render deployment config — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pathforge-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"
    startCommand: "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://your-app.vercel.app
