openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for PathForge - project-based learning app
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: Learner profile operations
  - name: projects
    description: Project operations
  - name: nodemap
    description: Node map operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get learner profile
      description: Returns the authenticated learner's profile
      responses:
        "200":
          description: Profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearnerProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertProfile
      tags: [profile]
      summary: Create or update learner profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LearnerProfileInput"
      responses:
        "200":
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearnerProfile"
    delete:
      operationId: deleteProfile
      tags: [profile]
      summary: Delete learner profile
      description: Permanently deletes the authenticated learner's profile
      responses:
        "204":
          description: Profile deleted

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects for the authenticated user
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/recommendations:
    get:
      operationId: getProjectRecommendations
      tags: [projects]
      summary: Get the learner's persisted project recommendations, generating them once if none exist yet
      description: Returns the ~10 example project ideas (title, description, category) already stored for the authenticated learner. If none have been generated yet, generates and persists a set based on their profile first. Does not regenerate an existing set — use the POST endpoint for that.
      responses:
        "200":
          description: Recommended project ideas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectRecommendationsResponse"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: regenerateProjectRecommendations
      tags: [projects]
      summary: Regenerate and persist a fresh set of project recommendations
      description: Always generates a new set of ~10 project ideas based on the learner's profile and overwrites the persisted set — used by the dashboard's "New ideas" action.
      responses:
        "200":
          description: New recommended project ideas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectRecommendationsResponse"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/generate-map:
    post:
      operationId: generateNodeMap
      tags: [nodemap]
      summary: Generate AI node map for a project
      description: Calls the AI to generate a personalized learning node map based on the project idea and learner profile
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Node map generated and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeMap"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/map:
    get:
      operationId: getNodeMap
      tags: [nodemap]
      summary: Get the node map for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Node map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeMap"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/stats:
    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Get progress stats for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStats"

  /projects/{projectId}/revise-plan:
    post:
      operationId: revisePlan
      tags: [nodemap]
      summary: Revise future nodes using AI based on a learner direction change
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevisePlanInput"
      responses:
        "200":
          description: Updated node map after revision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeMap"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI revision failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/nodes/{nodeId}/chat:
    get:
      operationId: getNodeChat
      tags: [nodemap]
      summary: Get chat history for a node
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: nodeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeChatHistory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendNodeChatMessage
      tags: [nodemap]
      summary: Send a message to the node AI tutor (streaming SSE)
      description: Streams AI response chunks. After DONE, may emit extra_node_spawned if auto-spawn triggered.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: nodeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeChatMessageInput"
      responses:
        "200":
          description: SSE stream of assistant chunks
          content:
            text/event-stream: {}
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/nodes/{nodeId}/opening-message:
    post:
      operationId: getNodeOpeningMessage
      tags: [nodemap]
      summary: Generate and stream the AI opening message for a node (first-open only)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: nodeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of opening message chunks
          content:
            text/event-stream: {}
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/nodes/{nodeId}/step-detail:
    post:
      operationId: getNodeStepDetail
      tags: [nodemap]
      summary: Generate and stream detailed content for a session step (streaming SSE)
      description: Lazily generates the detailed walkthrough for one step of a node's session plan; result is cached server-side so subsequent opens don't regenerate.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: nodeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StepDetailInput"
      responses:
        "200":
          description: SSE stream of step detail chunks
          content:
            text/event-stream: {}
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/nodes/{nodeId}/visualize:
    post:
      operationId: getNodeVisualization
      tags: [nodemap]
      summary: Generate and stream an interactive HTML visualization for a concept (streaming SSE)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: nodeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisualizeInput"
      responses:
        "200":
          description: SSE stream of visualization HTML chunks
          content:
            text/event-stream: {}
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/nodes/{nodeId}/spawn:
    post:
      operationId: spawnExtraNode
      tags: [nodemap]
      summary: Spawn extra learning node from chat context
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: nodeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpawnNodeInput"
      responses:
        "201":
          description: Spawned node map (full updated map)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeMap"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/nodes/{nodeId}:
    patch:
      operationId: updateNodeStatus
      tags: [nodemap]
      summary: Mark node as completed (with optional summary; AI-generates one if omitted)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: nodeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeStatusUpdate"
      responses:
        "200":
          description: Node updated; returns full updated node map (with unlocked nodes and summary)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeMap"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    LearnerProfile:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        age:
          type: ["integer", "null"]
        educationLevel:
          type: ["string", "null"]
        major:
          type: ["string", "null"]
        profileSummary:
          type: string
          description: Condensed free-text summary of the learner's interests and experience (built from onboarding MCQ answers)
        preferredLanguage:
          type: ["string", "null"]
        isComplete:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - clerkUserId
        - profileSummary
        - isComplete
        - createdAt
        - updatedAt

    LearnerProfileInput:
      type: object
      properties:
        age:
          type: ["integer", "null"]
        educationLevel:
          type: ["string", "null"]
        major:
          type: ["string", "null"]
        profileSummary:
          type: string
        preferredLanguage:
          type: ["string", "null"]
        isComplete:
          type: boolean
      required:
        - profileSummary
        - isComplete

    Project:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        title:
          type: string
        ideaPrompt:
          type: string
        status:
          type: string
          enum: [draft, active, completed]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - clerkUserId
        - title
        - ideaPrompt
        - status
        - createdAt
        - updatedAt

    ProjectRecommendation:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [algorithm, math-impl, hardware, robotics, workflow-tools, cybersecurity, data-analytics, enterprise-integration, document-heavy, theory]
      required:
        - title
        - description
        - category

    ProjectRecommendationsResponse:
      type: object
      properties:
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/ProjectRecommendation"
      required:
        - recommendations

    ProjectInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        ideaPrompt:
          type: string
          minLength: 1
      required:
        - title
        - ideaPrompt

    ProjectUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        status:
          type: string
          enum: [draft, active, completed]

    ProjectStats:
      type: object
      properties:
        projectId:
          type: integer
        totalNodes:
          type: integer
        completedNodes:
          type: integer
        availableNodes:
          type: integer
        extraNodes:
          type: integer
        progressPercent:
          type: number
      required:
        - projectId
        - totalNodes
        - completedNodes
        - availableNodes
        - extraNodes
        - progressPercent

    NodeMap:
      type: object
      properties:
        projectId:
          type: integer
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/NodeEdge"
      required:
        - projectId
        - nodes
        - edges

    Node:
      type: object
      properties:
        id:
          type: integer
        mapId:
          type: integer
        title:
          type: string
        brief:
          type: string
        status:
          type: string
          enum: [locked, available, completed]
        isExtra:
          type: boolean
        summary:
          type: ["string", "null"]
        positionX:
          type: ["number", "null"]
        positionY:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - mapId
        - title
        - brief
        - status
        - isExtra
        - createdAt

    NodeEdge:
      type: object
      properties:
        id:
          type: integer
        fromNodeId:
          type: integer
        toNodeId:
          type: integer
      required:
        - id
        - fromNodeId
        - toNodeId

    NodeStatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [completed]
        summary:
          type: ["string", "null"]
          description: Optional one-liner summary; AI generates one if omitted
      required:
        - status

    RevisePlanInput:
      type: object
      properties:
        description:
          type: string
          minLength: 1
          description: Natural language description of the direction change
      required:
        - description

    NodeChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
      required:
        - role
        - content
        - createdAt

    NodeChatHistory:
      type: object
      properties:
        nodeId:
          type: integer
        messages:
          type: array
          items:
            $ref: "#/components/schemas/NodeChatMessage"
      required:
        - nodeId
        - messages

    NodeChatMessageInput:
      type: object
      properties:
        content:
          type: string
          minLength: 1
      required:
        - content

    SpawnNodeInput:
      type: object
      properties:
        topic:
          type: string
          minLength: 1
          description: Topic or reason for the extra node to spawn
      required:
        - topic

    VisualizeInput:
      type: object
      properties:
        topic:
          type: string
          minLength: 1
          maxLength: 500
          description: Concept or topic to visualize
      required:
        - topic

    StepDetailInput:
      type: object
      properties:
        stepIndex:
          type: integer
          description: 1-based index of the step within the session plan
        stepTitle:
          type: string
          minLength: 1
        stepBrief:
          type: string
      required:
        - stepIndex
        - stepTitle
